name: SafeVault CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: cd auth-service && npm install && node --check index.js

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: cd upload-service && pip install -r requirements.txt && python -m py_compile app.py

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t safevault-auth:${{ github.sha }} ./auth-service
      - run: docker build -t safevault-upload:${{ github.sha }} ./upload-service
      - run: docker build -t safevault-frontend:${{ github.sha }} ./frontend

  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build && sleep 35
      - run: curl -f http://localhost:8000/health
      - run: curl -f http://localhost:5000/health
      - run: curl -f http://localhost:3000
      - run: docker compose ps
      - if: failure()
        run: docker compose logs
      - if: always()
        run: docker compose down -v

  push:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/safevault-auth:latest

      - uses: docker/build-push-action@v5
        with:
          context: ./upload-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/safevault-upload:latest

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/safevault-frontend:latest
